<!--ViewModel:CookieVm-->
<!--Title:Cookies:-40-->
<div style="margin: 2em;">

    <h3>Cookies</h3>
    <p>
        Theme: '{{Theme}}',  Used CSS = 'theme{{Theme}}.css'<br />
    </p>
    <p>
        <select class="form-select" v-model="Theme" v-focus style="width: unset;"
                onchange="document.cookie='theme=' + this.value; location.replace('index.html?ts=' + new Date().getTime());" >
            <option value="">Light</option>
            <option value="dark">Dark</option>
            <option value="blue">Blue</option>
        </select>
    </p>
    <p>
        <button class="btn btn-sm btn-secondary" @click="GoBack()">Navigate Back</button>
    </p>

</div>
